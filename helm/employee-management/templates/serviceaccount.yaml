{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ems.serviceAccountName" . }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
  {{- if .Values.keyVault.enabled }}
  annotations:
    # Federated to the workload-identity UAMI (see Terraform azurerm_federated_identity_credential).
    azure.workload.identity/client-id: {{ required "keyVault.clientId is required" .Values.keyVault.clientId | quote }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- with .Values.imagePullSecrets }}
# Pods using this ServiceAccount automatically inherit these pull secrets
# (Kubernetes' ServiceAccount admission controller merges them in) — needed
# when images come from a private registry like Docker Hub, not needed for ACR
# (the AKS kubelet identity has AcrPull instead).
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end -}}

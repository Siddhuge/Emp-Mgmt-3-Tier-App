{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ems.fullname" . }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
# Least-privilege: read-only access to this release's own ConfigMap/Secret.
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "ems.configMapName" . }}"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ include "ems.secretName" . }}"]
    verbs: ["get"]
{{- end -}}

{{- if .Values.secrets.create -}}
{{- $host := include "ems.postgresService" . -}}
{{- $port := .Values.postgres.service.port | toString -}}
{{- $user := .Values.postgres.auth.username -}}
{{- $db := .Values.postgres.auth.database -}}
{{- $pass := required "secrets.postgresPassword is required" .Values.secrets.postgresPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ems.secretName" . }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials
  POSTGRES_PASSWORD: {{ $pass | quote }}
  # Full SQLAlchemy URL (contains the password, so it lives in the Secret)
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s" $user $pass $host $port $db | quote }}
  # Application secrets
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  SEED_ADMIN_PASSWORD: {{ required "secrets.seedAdminPassword is required" .Values.secrets.seedAdminPassword | quote }}
{{- end -}}

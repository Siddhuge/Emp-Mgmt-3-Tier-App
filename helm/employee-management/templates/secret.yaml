{{- if and .Values.secrets.create (not .Values.keyVault.enabled) (not .Values.secrets.existingSecret) -}}
# Chart-managed Secret — used only when NOT sourcing from Key Vault and NOT
# using an external Secret. Keys match the Key Vault CSI-synced Secret so the
# deployments are identical either way. DATABASE_URL is assembled in-pod from
# these parts + the ConfigMap (see backend-deployment.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ems.secretName" . }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required (or set keyVault.enabled / secrets.existingSecret)" .Values.secrets.postgresPassword | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required (or set keyVault.enabled / secrets.existingSecret)" .Values.secrets.jwtSecret | quote }}
  SEED_ADMIN_PASSWORD: {{ required "secrets.seedAdminPassword is required (or set keyVault.enabled / secrets.existingSecret)" .Values.secrets.seedAdminPassword | quote }}
{{- end -}}

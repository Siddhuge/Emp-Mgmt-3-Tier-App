{{- if .Values.postgres.enabled -}}
{{- $component := "postgres" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ems.componentName" (dict "ctx" . "component" $component) }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  # Headless service => stable DNS identity for the StatefulSet pod.
  clusterIP: None
  selector:
    {{- include "ems.selectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
{{- end -}}

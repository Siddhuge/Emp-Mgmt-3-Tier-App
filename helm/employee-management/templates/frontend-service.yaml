{{- if .Values.frontend.enabled -}}
{{- $component := "frontend" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ems.componentName" (dict "ctx" . "component" $component) }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  # ClusterIP: exposed to the outside world only through the Ingress.
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "ems.selectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
{{- end -}}

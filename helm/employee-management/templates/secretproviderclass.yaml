{{- if .Values.keyVault.enabled -}}
{{- $kv := .Values.keyVault -}}
# Pulls secrets from Azure Key Vault via the Secrets Store CSI driver and syncs
# them into a Kubernetes Secret ({{ include "ems.kvSecretName" . }}) that the
# app consumes as env vars. No secret values live in Git or in this chart.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "ems.secretProviderClassName" . }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
spec:
  provider: azure
  # Materialize the mounted secrets into a real K8s Secret for env consumption.
  secretObjects:
    - secretName: {{ include "ems.kvSecretName" . }}
      type: Opaque
      data:
        - objectName: {{ $kv.secrets.jwtSecret }}
          key: JWT_SECRET
        - objectName: {{ $kv.secrets.postgresPassword }}
          key: POSTGRES_PASSWORD
        - objectName: {{ $kv.secrets.seedAdminPassword }}
          key: SEED_ADMIN_PASSWORD
  parameters:
    # Auth via Workload Identity: the CSI driver uses the pod's federated
    # ServiceAccount token to obtain a token for this UAMI (Key Vault Secrets User).
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ required "keyVault.clientId is required (terraform output kv_identity_client_id)" $kv.clientId | quote }}
    keyvaultName: {{ required "keyVault.name is required (terraform output key_vault_name)" $kv.name | quote }}
    tenantId: {{ required "keyVault.tenantId is required (terraform output tenant_id)" $kv.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ $kv.secrets.jwtSecret }}
          objectType: secret
        - |
          objectName: {{ $kv.secrets.postgresPassword }}
          objectType: secret
        - |
          objectName: {{ $kv.secrets.seedAdminPassword }}
          objectType: secret
{{- end -}}

{{- if .Values.backend.enabled -}}
{{- $component := "backend" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ems.componentName" (dict "ctx" . "component" $component) }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  # Internal-only: reached by the frontend and the Ingress, never exposed directly.
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "ems.selectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
{{- end -}}

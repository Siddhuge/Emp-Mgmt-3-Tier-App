{{- if .Values.postgres.enabled -}}
{{- $component := "postgres" -}}
{{- $name := include "ems.componentName" (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  # StatefulSet => stable identity + ordered lifecycle for the database.
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "ems.selectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ems.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      serviceAccountName: {{ include "ems.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        # Own the data volume so the postgres user can write to it.
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ include "ems.image" (dict "root" . "cfg" .Values.postgres) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.service.port }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ems.configMapName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ems.configMapName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ems.secretName" . }}
                  key: POSTGRES_PASSWORD
            # Keep data in a subdirectory so the volume root (lost+found) is fine.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            failureThreshold: 30
            periodSeconds: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # postgres entrypoint drops root -> postgres user at startup.
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      {{- if .Values.postgres.persistence.standalone }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ems.componentName" (dict "ctx" . "component" "postgres") }}-data
      {{- end }}
  {{- if and .Values.postgres.persistence.enabled (not .Values.postgres.persistence.standalone) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "ems.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.postgres.persistence.accessModes | nindent 10 }}
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
{{- end -}}

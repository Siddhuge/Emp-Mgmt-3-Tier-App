{{- if .Values.backend.enabled -}}
{{- $component := "backend" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ems.componentName" (dict "ctx" . "component" $component) }}
  labels:
    {{- include "ems.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  # Zero-downtime rolling updates: bring a new pod up before removing an old one.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ems.selectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when config/secret content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "ems.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
        {{- if .Values.keyVault.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ include "ems.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- include "ems.affinity" (dict "ctx" . "component" $component) | nindent 6 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "ems.image" (dict "root" . "cfg" .Values.backend) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
          # Non-secret config from the ConfigMap.
          envFrom:
            - configMapRef:
                name: {{ include "ems.configMapName" . }}
          env:
            # DB connection parts (non-secret) — referenced by DATABASE_URL below.
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: {{ include "ems.configMapName" . }}, key: POSTGRES_USER } }
            - name: POSTGRES_HOST
              valueFrom: { configMapKeyRef: { name: {{ include "ems.configMapName" . }}, key: POSTGRES_HOST } }
            - name: POSTGRES_PORT
              valueFrom: { configMapKeyRef: { name: {{ include "ems.configMapName" . }}, key: POSTGRES_PORT } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: {{ include "ems.configMapName" . }}, key: POSTGRES_DB } }
            # Secrets — from Key Vault (CSI-synced) or the chart/external Secret.
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "ems.secretName" . }}, key: POSTGRES_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "ems.secretName" . }}, key: JWT_SECRET } }
            - name: SEED_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "ems.secretName" . }}, key: SEED_ADMIN_PASSWORD } }
            # Assembled by Kubernetes from the vars above (no secret in Git).
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          # Startup probe protects slow first-boot (DB connect + migrations/seed).
          startupProbe:
            httpGet:
              path: {{ .Values.backend.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.backend.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
          # Graceful shutdown: give the LB time to stop routing before exit.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.keyVault.enabled }}
            # Mounting the CSI volume is what triggers the Key Vault -> Secret sync.
            - name: kv-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.keyVault.enabled }}
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.x-k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "ems.secretProviderClassName" . }}
        {{- end }}
{{- end -}}

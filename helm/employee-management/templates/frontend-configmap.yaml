{{- if .Values.frontend.enabled -}}
{{- $backend := include "ems.componentName" (dict "ctx" . "component" "backend") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ems.componentName" (dict "ctx" . "component" "frontend") }}-nginx
  labels:
    {{- include "ems.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  # Environment-aware nginx config. Unlike the baked-in Compose config, this
  # proxies /api to the in-cluster backend Service DNS name. Mounted over
  # /etc/nginx/conf.d/default.conf. (Via the Ingress, /api is routed straight to
  # the backend; this proxy also makes the frontend Service self-sufficient.)
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        server_tokens off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://{{ $backend }}:{{ .Values.backend.service.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
{{- end -}}

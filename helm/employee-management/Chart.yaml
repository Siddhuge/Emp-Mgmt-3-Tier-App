apiVersion: v2
name: employee-management
description: Production-grade Helm chart for the Employee Management System (React + FastAPI + PostgreSQL)
type: application
# Chart version — bumped for chart/template changes (app appVersion unchanged).
version: 1.4.0
appVersion: "1.0.0"
keywords:
  - employee-management
  - fastapi
  - react
  - postgresql
maintainers:
  - name: Platform Team
home: https://employee.sidhuge.xyz
sources:
  - https://example.com/employee-management
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: values-test.yaml for the Terraform-provisioned "test" AKS environment (dev/test naming now consistent between infra and chart)
    - kind: added
      description: imagePullSecrets support (via the ServiceAccount) for pulling images from private registries such as Docker Hub
    - kind: added
      description: Azure Key Vault secrets via the Secrets Store CSI driver with Workload Identity (no hardcoded secrets, no node-wide identity); DATABASE_URL assembled in-pod
    - kind: added
      description: TLS via cert-manager (Let's Encrypt) with per-environment issuers
    - kind: added
      description: NetworkPolicy allowing the ingress controller to reach cert-manager HTTP-01 ACME solver pods
    - kind: added
      description: Environment-aware frontend nginx ConfigMap that proxies /api to the in-cluster backend Service
    - kind: changed
      description: Ingress hosts and CORS origins moved to the sidhuge.xyz domain

# ---- Production overrides ----
global:
  environment: prod

config:
  logLevel: warning
  accessTokenExpireMinutes: "60"
  corsOrigins: "https://employee.sidhuge.xyz"

# In production, inject secrets via an external secret store / sealed-secrets.
secrets:
  create: false
  existingSecret: employee-management-secret

# Require replicas to spread across nodes.
podAntiAffinity: hard

frontend:
  replicaCount: 3
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 10 }
  pdb: { enabled: true, minAvailable: 2 }

backend:
  replicaCount: 3
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1", memory: 1Gi }
  autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 10 }
  pdb: { enabled: true, minAvailable: 2 }

postgres:
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: "2", memory: 2Gi }
  persistence:
    size: 20Gi
    storageClass: managed-premium
  pdb: { enabled: true, minAvailable: 1 }

ingress:
  host: employee.sidhuge.xyz
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: employee-prod-tls

networkPolicy:
  enabled: true

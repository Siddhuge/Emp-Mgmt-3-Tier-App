# kind cluster for local Phase 3 validation: 1 control-plane + 2 workers.
# The control-plane is ingress-ready and maps host ports 80/443 for NGINX Ingress.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ems
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8081
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker

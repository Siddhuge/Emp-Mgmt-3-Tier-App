---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: employee-management
  labels:
    app.kubernetes.io/name: employee-management
    app.kubernetes.io/instance: employee-management
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: employee-management
    environment: "default"
# Least-privilege: read-only access to this release's own ConfigMap/Secret.
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["employee-management-config"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["employee-management-kv"]
    verbs: ["get"]

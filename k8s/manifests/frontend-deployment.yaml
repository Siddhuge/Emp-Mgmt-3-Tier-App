---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-management-frontend
  labels:
    app.kubernetes.io/name: employee-management
    app.kubernetes.io/instance: employee-management
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: employee-management
    environment: "default"
    app.kubernetes.io/component: frontend
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: employee-management
      app.kubernetes.io/instance: employee-management
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        checksum/config: 4599d730a61095130ac1c85493d3e4b0c8bf178ea87666c465e94f6a20019b63
        checksum/nginx: 4b7f745944d578b32413f71cbe2da3ad23788529eebe4aebbaf7cad7a0e31643
      labels:
        app.kubernetes.io/name: employee-management
        app.kubernetes.io/instance: employee-management
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: employee-management
        environment: "default"
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: employee-management
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: employee-management
                    app.kubernetes.io/instance: employee-management
                    app.kubernetes.io/component: frontend
      containers:
        - name: frontend
          image: ${REGISTRY}/frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # nginx needs writable temp/cache/run paths under a read-only rootfs.
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
        - name: nginx-config
          configMap:
            name: employee-management-frontend-nginx

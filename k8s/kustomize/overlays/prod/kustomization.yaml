apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: employee-prod
resources:
  - namespace.yaml
  - ../../base
labels:
  - includeSelectors: false
    pairs:
      environment: prod
# prod keeps the base sizing (3-10 HPA, larger resources). Only host/TLS + config differ.
patches:
  - target: { kind: Ingress, name: employee-management }
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: employee.sidhuge.xyz
      - op: add
        path: /spec/tls
        value:
          - hosts: ["employee.sidhuge.xyz"]
            secretName: employee-prod-tls
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1ssl-redirect
        value: "true"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1force-ssl-redirect
        value: "true"
  - path: patch-configmap.yaml

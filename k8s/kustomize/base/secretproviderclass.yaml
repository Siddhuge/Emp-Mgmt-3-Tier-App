---
# Pulls secrets from Azure Key Vault via the Secrets Store CSI driver and syncs
# them into a Kubernetes Secret (employee-management-kv) that the
# app consumes as env vars. No secret values live in Git or in this chart.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: employee-management-kv
  labels:
    app.kubernetes.io/name: employee-management
    app.kubernetes.io/instance: employee-management
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: employee-management
    environment: "default"
spec:
  provider: azure
  # Materialize the mounted secrets into a real K8s Secret for env consumption.
  secretObjects:
    - secretName: employee-management-kv
      type: Opaque
      data:
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
        - objectName: seed-admin-password
          key: SEED_ADMIN_PASSWORD
  parameters:
    # Auth via Workload Identity: the CSI driver uses the pod's federated
    # ServiceAccount token to obtain a token for this UAMI (Key Vault Secrets User).
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${KV_CLIENT_ID}"
    keyvaultName: "${KV_NAME}"
    tenantId: "${KV_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: postgres-password
          objectType: secret
        - |
          objectName: seed-admin-password
          objectType: secret

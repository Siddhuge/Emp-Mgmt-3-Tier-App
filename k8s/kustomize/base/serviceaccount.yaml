---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: employee-management
  labels:
    app.kubernetes.io/name: employee-management
    app.kubernetes.io/instance: employee-management
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: employee-management
    environment: "default"
  annotations:
    # Federated to the workload-identity UAMI (see Terraform azurerm_federated_identity_credential).
    azure.workload.identity/client-id: "${KV_CLIENT_ID}"
automountServiceAccountToken: false

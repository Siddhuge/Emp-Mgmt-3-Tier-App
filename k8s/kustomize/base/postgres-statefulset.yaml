---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: employee-management-postgres
  labels:
    app.kubernetes.io/name: employee-management
    app.kubernetes.io/instance: employee-management
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: employee-management
    environment: "default"
    app.kubernetes.io/component: postgres
spec:
  # StatefulSet => stable identity + ordered lifecycle for the database.
  serviceName: employee-management-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: employee-management
      app.kubernetes.io/instance: employee-management
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: employee-management
        app.kubernetes.io/instance: employee-management
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: employee-management
        environment: "default"
        app.kubernetes.io/component: postgres
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: employee-management
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        # Own the data volume so the postgres user can write to it.
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: ${REGISTRY}/database-init:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: employee-management-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: employee-management-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: employee-management-kv
                  key: POSTGRES_PASSWORD
            # Keep data in a subdirectory so the volume root (lost+found) is fine.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            failureThreshold: 30
            periodSeconds: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # postgres entrypoint drops root -> postgres user at startup.
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # Mount the CSI volume so the Key Vault -> Secret sync happens.
            - name: kv-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.x-k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: employee-management-kv
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: employee-management
          app.kubernetes.io/instance: employee-management
          app.kubernetes.io/version: "1.0.0"
          app.kubernetes.io/part-of: employee-management
          environment: "default"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi

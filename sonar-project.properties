# SonarCloud (SonarQube Cloud) configuration (read by the SAST job).
# After importing the repo at sonarcloud.io, copy the exact org key + project key
# from the project's setup page and set them here. Only SONAR_TOKEN is needed as
# a GitHub secret (host is https://sonarcloud.io, set in the workflow).
sonar.organization=siddhuge
sonar.projectKey=Siddhuge_Emp-Mgmt-3-Tier-App
sonar.projectName=Employee Management System

# Analyzed source (Python backend + TS frontend); tests declared separately.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/app/tests
sonar.test.inclusions=backend/app/tests/**

sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Keep generated / vendored / non-source paths out of analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/__pycache__/**,frontend/src/vite-env.d.ts

# SonarQube project configuration (read by the SAST job).
# Create a matching project in your SonarQube server and set SONAR_TOKEN /
# SONAR_HOST_URL as GitHub secrets.
sonar.projectKey=employee-management
sonar.projectName=Employee Management System

# Analyzed source (Python backend + TS frontend); tests declared separately.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/app/tests
sonar.test.inclusions=backend/app/tests/**

sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Keep generated / vendored / non-source paths out of analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/__pycache__/**,frontend/src/vite-env.d.ts

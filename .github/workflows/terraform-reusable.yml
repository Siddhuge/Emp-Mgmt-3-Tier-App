# Reusable Terraform job. Runs in one of two modes:
#   plan  : init -> fmt -> tflint -> Trivy -> validate -> plan  (ungated; plan is
#           uploaded as an artifact and shown in the job summary / PR comment)
#   apply : downloads the reviewed plan artifact and applies exactly it (gated by
#           the environment's approval rule)
# Auth is passwordless (GitHub OIDC -> Entra federated identity).
name: terraform-reusable

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev or test)."
        type: string
        required: true
      mode:
        description: "plan or apply."
        type: string
        required: true
      destroy:
        description: "Plan/apply a destroy instead of a create."
        type: boolean
        default: false
      terraform_version:
        type: string
        default: "1.9.8"
      working_directory:
        type: string
        default: "terraform"

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  terraform:
    name: "${{ inputs.environment }} · ${{ inputs.mode }}${{ inputs.destroy && ' (destroy)' || '' }}"
    runs-on: ubuntu-latest

    # Apply runs in the PROTECTED environment (approval happens here, AFTER the
    # separate plan job has already produced a reviewable plan). Plan runs in the
    # unprotected "<env>-plan" environment (no approval).
    environment: ${{ inputs.mode == 'apply' && inputs.environment || format('{0}-plan', inputs.environment) }}

    concurrency:
      group: terraform-${{ inputs.environment }}
      cancel-in-progress: false

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_SA }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ inputs.environment }}.tfstate"

      # ============================ PLAN ============================
      - name: Format check
        if: inputs.mode == 'plan'
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        if: inputs.mode == 'plan'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: TFLint
        if: inputs.mode == 'plan'
        run: |
          tflint --init
          tflint --recursive --format compact

      - name: Trivy IaC security scan (SARIF)
        if: inputs.mode == 'plan'
        # v0.36.0+ pins its nested setup-trivy to a commit SHA (older tags
        # referenced now-deleted setup-trivy tags and fail to resolve).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ inputs.working_directory }}
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy SARIF
        # trivy-action (a `uses:` step) ignores working-directory, so the SARIF
        # lands at the workspace root — upload it from there.
        if: inputs.mode == 'plan'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac-${{ inputs.environment }}

      - name: Terraform validate
        if: inputs.mode == 'plan'
        run: terraform validate -no-color

      - name: Terraform plan
        if: inputs.mode == 'plan'
        run: |
          terraform plan -no-color -lock-timeout=5m \
            -var-file="${{ inputs.environment }}.tfvars" \
            ${{ inputs.destroy && '-destroy' || '' }} \
            -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Publish plan to job summary
        if: inputs.mode == 'plan'
        run: |
          {
            echo "### Terraform plan — \`${{ inputs.environment }}\`${{ inputs.destroy && ' (DESTROY)' || '' }}";
            echo '```hcl';
            head -c 60000 plan.txt;
            echo '';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment plan on PR
        if: inputs.mode == 'plan' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = '${{ inputs.working_directory }}';
            let plan = fs.readFileSync(`${dir}/plan.txt`, 'utf8');
            const max = 63000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated, see job summary)';
            const marker = `<!-- tf-plan:${{ inputs.environment }} -->`;
            const body = `${marker}\n### Terraform plan — \`${{ inputs.environment }}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Upload plan artifact
        if: inputs.mode == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: |
            ${{ inputs.working_directory }}/tfplan
            ${{ inputs.working_directory }}/plan.txt
          retention-days: 5

      # ============================ APPLY ============================
      # Runs only after approval; applies the exact plan reviewed in the plan job.
      - name: Download reviewed plan
        if: inputs.mode == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform apply (reviewed plan)
        if: inputs.mode == 'apply'
        run: terraform apply -no-color -lock-timeout=5m tfplan

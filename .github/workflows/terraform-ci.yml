# Terraform CI/CD for Azure (AKS dev/test).
#   PR to main   -> plan dev + test (ungated), posted as PR comments
#   push to main -> plan dev -> [approve] -> apply dev -> plan test -> [approve] -> apply test
#   manual run   -> plan a chosen env, and (if mode=apply) [approve] -> apply it
#
# Approval always happens AFTER a reviewable plan job has completed (its plan is
# in the job summary + uploaded as an artifact that apply consumes verbatim).
name: terraform-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: choice
        options: [dev, test]
        default: dev
      mode:
        description: "plan (review only) or apply"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  # ---- Pull request: plan every environment (review-only) ----
  plan:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, test]
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: ${{ matrix.environment }}
      mode: plan
    secrets: inherit

  # ---- Merge to main: plan -> approve -> apply, promoting dev then test ----
  plan-dev:
    if: github.event_name == 'push'
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: dev
      mode: plan
    secrets: inherit

  apply-dev:
    if: github.event_name == 'push'
    needs: plan-dev
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: dev
      mode: apply
    secrets: inherit

  plan-test:
    if: github.event_name == 'push'
    needs: apply-dev
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: test
      mode: plan
    secrets: inherit

  apply-test:
    if: github.event_name == 'push'
    needs: plan-test
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: test
      mode: apply
    secrets: inherit

  # ---- Manual: plan the chosen env; apply only if mode=apply (after approval) ----
  plan-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: ${{ inputs.environment }}
      mode: plan
    secrets: inherit

  apply-manual:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'apply'
    needs: plan-manual
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: ${{ inputs.environment }}
      mode: apply
    secrets: inherit

# Application CI (build stage) — DevSecOps gated pipeline.
#   1 GitLeaks (secrets) → 2 SonarQube (SAST) → 3 OWASP (SCA) → 4 test
#   → 5 build + Trivy image scan → 6 push to ACR → 7 cosign sign (keyless)
# Each stage gates the next. Push + sign happen only on `main` (PRs stop after scan).
# Azure auth is passwordless (OIDC); image signing is keyless (Sigstore).
name: ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "database/**"
      - "VERSION"
      - "sonar-project.properties"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "database/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write         # OIDC: Azure login + cosign keyless
  security-events: write  # SARIF → Security tab
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- 1. Secrets
  secret-scan:
    name: "1 · Secret scan (GitLeaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so GitLeaks scans all commits
      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # only needed for GitHub orgs

  # ------------------------------------------------------------------- 2. SAST
  sast:
    name: "2 · SAST (SonarQube)"
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # better SCM blame / new-code detection
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Quality gate (block on failure)
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # -------------------------------------------------------------------- 3. SCA
  sca:
    name: "3 · SCA (OWASP Dependency-Check)"
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: employee-management
          path: "."
          format: "SARIF,HTML"
          out: reports
          # Fail on High/Critical (CVSS >= 7). NVD API key avoids rate limits.
          args: >-
            --failOnCVSS 7
            --enableRetired
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}
      - name: Upload SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-sca
      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports
          retention-days: 14

  # ------------------------------------------------------------------- 4. Test
  test:
    name: "4 · Test (backend + frontend)"
    needs: sca
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Backend tests (pytest, SQLite)
        run: |
          pip install -r backend/requirements-dev.txt
          cd backend && pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend build + typecheck
        run: |
          cd frontend
          npm ci
          npm run build

  # --------------------------------------- 5-7. build → Trivy → push → sign
  image:
    name: "5-7 · ${{ matrix.component }}"
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { component: backend, context: ./backend }
          - { component: frontend, context: ./frontend }
          - { component: database-init, context: ./database }
    env:
      ACR: ${{ vars.ACR_LOGIN_SERVER }}
      IMAGE: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version + metadata
        id: meta
        run: |
          {
            echo "version=$(tr -d '[:space:]' < VERSION)"
            echo "sha=${GITHUB_SHA::7}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # 5a. Build locally (loaded into the runner's Docker) so we can scan
      #     BEFORE anything is pushed.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:git-${{ steps.meta.outputs.sha }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ steps.meta.outputs.date }}

      # 5b. Trivy gate — fail the build on fixable CRITICAL vulns.
      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      # ---- Everything below runs only on main (not on PRs) ----
      - name: Azure login (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.ref == 'refs/heads/main'
        run: az acr login --name ${{ vars.ACR_NAME }}

      # 6. Push the scanned image.
      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
          docker push ${{ env.IMAGE }}:git-${{ steps.meta.outputs.sha }}

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      # 7. Keyless sign by digest (Sigstore/Fulcio via GitHub OIDC — no keys).
      - name: Sign image (keyless)
        if: github.ref == 'refs/heads/main'
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }})
          echo "Signing $DIGEST"
          cosign sign --yes "$DIGEST"

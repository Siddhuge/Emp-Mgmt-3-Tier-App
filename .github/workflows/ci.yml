# Application CI (build stage) — DevSecOps gated pipeline.
#   1 GitLeaks (secrets) → 2 SonarQube (SAST) → 3 OWASP (SCA) → 4 test
#   → 5 build + Trivy image scan → 6 push to ACR → 7 cosign sign (keyless)
# Each stage gates the next. Push + sign happen only on `main` (PRs stop after scan).
# Azure auth is passwordless (OIDC); image signing is keyless (Sigstore).
name: ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "database/**"
      - "VERSION"
      - "sonar-project.properties"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "database/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write         # OIDC: Azure login + cosign keyless
  security-events: write  # SARIF → Security tab
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- 1. Secrets
  secret-scan:
    name: "1 · Secret scan (GitLeaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so GitLeaks scans all commits
      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # only needed for GitHub orgs

  # ------------------------------------------------------------------- 2. SAST
  sast:
    name: "2 · SAST (SonarQube)"
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # better SCM blame / new-code detection
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - name: Quality gate (block on failure)
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # -------------------------------------------------------------------- 3. SCA
  sca:
    name: "3 · SCA (OWASP Dependency-Check)"
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: employee-management
          path: "."
          format: "SARIF,HTML"
          out: reports
          # Fail on High/Critical (CVSS >= 7). NVD API key avoids rate limits.
          args: >-
            --failOnCVSS 7
            --enableRetired
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}
      - name: Upload SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-sca
      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports
          retention-days: 14

  # ------------------------------------------------------------------- 4. Test
  test:
    name: "4 · Test (backend + frontend)"
    needs: sca
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Backend tests (pytest, SQLite)
        run: |
          pip install -r backend/requirements-dev.txt
          cd backend && pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend build + typecheck
        run: |
          cd frontend
          npm ci
          npm run build

  # ------------------- 5-7. build → Trivy → push (ACR + Docker Hub) → sign
  # Push to both registries independently: if one is unavailable the job WARNS
  # and continues; it only fails if BOTH fail (or the Trivy gate finds CRITICALs).
  image:
    name: "5-7 · ${{ matrix.component }}"
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { component: backend, context: ./backend }
          - { component: frontend, context: ./frontend }
          - { component: database-init, context: ./database }
    env:
      PUBLISH: ${{ github.ref == 'refs/heads/main' }}
      LOCAL: employee-management/${{ matrix.component }}   # local-only tag for scanning
    steps:
      - uses: actions/checkout@v4

      - name: Compute version + metadata
        id: meta
        run: |
          {
            echo "version=$(tr -d '[:space:]' < VERSION)"
            echo "sha=${GITHUB_SHA::7}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # 5a. Build once, locally, so we can scan BEFORE pushing anywhere.
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          provenance: false
          tags: ${{ env.LOCAL }}:${{ steps.meta.outputs.version }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ steps.meta.outputs.date }}

      # 5b. Trivy gate — hard fail on fixable CRITICAL vulns.
      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL }}:${{ steps.meta.outputs.version }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Install cosign
        if: env.PUBLISH == 'true'
        uses: sigstore/cosign-installer@v3

      # ------------------------- Registry 1: Azure Container Registry -------------------------
      - name: "ACR · login (OIDC)"
        id: acr-login
        if: env.PUBLISH == 'true' && vars.ACR_LOGIN_SERVER != ''
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: "ACR · push + sign"
        id: acr
        if: env.PUBLISH == 'true' && vars.ACR_LOGIN_SERVER != '' && steps.acr-login.outcome == 'success'
        continue-on-error: true
        env:
          REPO: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.component }}
        run: |
          set -euo pipefail
          az acr login --name ${{ vars.ACR_NAME }}
          for t in "${{ steps.meta.outputs.version }}" "git-${{ steps.meta.outputs.sha }}"; do
            docker tag "$LOCAL:${{ steps.meta.outputs.version }}" "$REPO:$t"
            docker push "$REPO:$t" | tee /tmp/acr-push.log
          done
          DIGEST=$(grep -oE 'sha256:[0-9a-f]+' /tmp/acr-push.log | head -1)
          cosign sign --yes "$REPO@$DIGEST"
          echo "ACR: pushed + signed $REPO@$DIGEST"

      - name: "ACR · notify unavailable"
        if: env.PUBLISH == 'true' && vars.ACR_LOGIN_SERVER != '' && steps.acr.outcome != 'success'
        run: |
          echo "::warning title=ACR unavailable::${{ matrix.component }} could not be pushed/signed to ACR — continuing with Docker Hub."

      # ------------------------------- Registry 2: Docker Hub --------------------------------
      - name: "Docker Hub · login"
        id: dh-login
        if: env.PUBLISH == 'true' && vars.DOCKERHUB_USERNAME != ''
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Docker Hub · push + sign"
        id: dh
        if: env.PUBLISH == 'true' && vars.DOCKERHUB_USERNAME != '' && steps.dh-login.outcome == 'success'
        continue-on-error: true
        env:
          REPO: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.component }}
        run: |
          set -euo pipefail
          for t in "${{ steps.meta.outputs.version }}" "git-${{ steps.meta.outputs.sha }}"; do
            docker tag "$LOCAL:${{ steps.meta.outputs.version }}" "$REPO:$t"
            docker push "$REPO:$t" | tee /tmp/dh-push.log
          done
          DIGEST=$(grep -oE 'sha256:[0-9a-f]+' /tmp/dh-push.log | head -1)
          cosign sign --yes "$REPO@$DIGEST"
          echo "Docker Hub: pushed + signed $REPO@$DIGEST"

      - name: "Docker Hub · notify unavailable"
        if: env.PUBLISH == 'true' && vars.DOCKERHUB_USERNAME != '' && steps.dh.outcome != 'success'
        run: |
          echo "::warning title=Docker Hub unavailable::${{ matrix.component }} could not be pushed/signed to Docker Hub — continuing."

      # -------- Gate: succeed if ≥1 registry published; fail only if NONE did --------
      - name: "Publish gate"
        if: env.PUBLISH == 'true'
        run: |
          acr='${{ steps.acr.outcome }}'
          dh='${{ steps.dh.outcome }}'
          echo "ACR outcome=$acr | Docker Hub outcome=$dh"
          if [ "$acr" != "success" ] && [ "$dh" != "success" ]; then
            echo "::error title=No registry available::${{ matrix.component }}: both ACR and Docker Hub failed/were unavailable."
            exit 1
          fi
          echo "✓ ${{ matrix.component }} published to at least one registry."
